<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Name Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0e0c0a;
      --surface:   #1a1713;
      --border:    #3a3228;
      --gold:      #c9a84c;
      --gold-dim:  #7a6430;
      --text:      #e8dfc8;
      --text-dim:  #8a7f6a;
      --accent:    #8b3a2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(139,58,42,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.4;
    }

    header .subtitle {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-dim);
      font-style: italic;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin: 1.5rem 0;
    }

    button#generate {
      display: block;
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    button#generate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    button#generate:hover {
      border-color: var(--gold);
      color: var(--text);
      box-shadow: 0 0 20px rgba(201,168,76,0.15);
    }

    button#generate:hover::before { opacity: 1; }

    button#generate:active {
      transform: scale(0.99);
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.8rem 2rem;
      margin-top: 1.5rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      position: relative;
    }

    .result-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .result-card::before,
    .result-card::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--gold-dim);
      border-style: solid;
    }
    .result-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .result-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    .result-row {
      display: grid;
      grid-template-columns: 9rem 1fr;
      gap: 0.3rem 1rem;
      align-items: baseline;
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(58,50,40,0.5);
    }

    .result-row:last-child { border-bottom: none; }

    .result-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-dim);
      font-family: 'Cinzel Decorative', serif;
      font-weight: 400;
    }

    .result-value {
      font-size: 1.15rem;
      color: var(--text);
      font-style: italic;
    }

    .result-row.appears-as .result-value {
      color: var(--gold);
      font-style: normal;
      font-size: 1.25rem;
    }

    .result-row.origin .result-value {
      font-size: 0.95rem;
      color: var(--text-dim);
      font-style: normal;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 0 0.5rem;
      color: var(--text-dim);
      font-style: italic;
      font-size: 0.95rem;
    }

    .corner-ornament {
      text-align: center;
      color: var(--gold-dim);
      font-size: 1.1rem;
      letter-spacing: 0.5em;
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="corner-ornament">— ✦ —</div>
    <h1>Name Generator</h1>
    <p class="subtitle">Draw from the world's naming traditions</p>
  </header>

  <div class="divider"></div>

  <button id="generate">Generate Name</button>

  <div class="result-card" id="resultCard">
    <div class="empty-state" id="emptyState">Press generate to draw a name.</div>
    <div id="resultRows" style="display:none;">
      <div class="result-row"><span class="result-label">Male</span><span class="result-value" id="outMale"></span></div>
      <div class="result-row"><span class="result-label">Female</span><span class="result-value" id="outFemale"></span></div>
      <div class="result-row"><span class="result-label">Surname</span><span class="result-value" id="outSurname"></span></div>
      <div class="result-row appears-as"><span class="result-label">Appears as</span><span class="result-value" id="outAppears"></span></div>
      <div class="result-row origin"><span class="result-label">Given Origin</span><span class="result-value" id="outGivenOrigin"></span></div>
      <div class="result-row origin"><span class="result-label">Surname Origin</span><span class="result-value" id="outSurnameOrigin"></span></div>
    </div>
  </div>

  <div class="divider" style="margin-top:1.5rem;"></div>
</div>

// =============================================================================
//  ENGINE  — no need to edit below this line
// =============================================================================

function roll() {
  return Math.floor(Math.random() * 100); // 0–99
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateName() {
  const r1 = roll();
  const r2 = roll();
  const r3 = roll();
  const r4 = roll();

  const list1 = ROLL_TABLE[r1];
  let   list2 = ROLL_TABLE[r2];
  const list3 = ROLL_TABLE[r3];
  const list4 = ROLL_TABLE[r4];

  // If roll3 or roll4 matches list1, use it as list2
  if (list3 === list1) {
    list2 = list3;
  } else if (list4 === list1) {
    list2 = list4;
  }

  const givenData   = NAME_LISTS[list1];
  const surnameData = NAME_LISTS[list2];

  const maleName   = pick(givenData.a);
  const femaleName = pick(givenData.b);
  const surname    = pick(surnameData.c);

  const surnameFirst = surnameData.surnameFirst;

  const appearsAsMale   = surnameFirst ? `${surname} ${maleName}`   : `${maleName} ${surname}`;
  const appearsAsFemale = surnameFirst ? `${surname} ${femaleName}` : `${femaleName} ${surname}`;

  document.getElementById('outMale').textContent         = maleName;
  document.getElementById('outFemale').textContent       = femaleName;
  document.getElementById('outSurname').textContent      = surname;
  document.getElementById('outAppears').textContent      = `${appearsAsMale}  /  ${appearsAsFemale}`;
  document.getElementById('outGivenOrigin').textContent  = givenData.label;
  document.getElementById('outSurnameOrigin').textContent = surnameData.label;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultRows').style.display = 'block';

  const card = document.getElementById('resultCard');
  card.classList.remove('visible');
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('visible')));
}

document.getElementById('generate').addEventListener('click', generateName);

// Show card on load
document.getElementById('resultCard').classList.add('visible');
